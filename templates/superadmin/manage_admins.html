{% extends "superadmin/base.html" %}

{% block super_admin_content %}
<div class="container-fluid">
  <h2 class="mb-4">Manage Admins</h2>

  <!-- Add Admin Form -->
  <div class="card mb-4">
    <div class="card-header">
      Add New Admin
    </div>
    <div class="card-body">
      <form method="POST" action="{{ url_for('superadmin.add_admin') }}">
        <div class="row g-3">
          <div class="col-md-4">
            <input type="text" class="form-control" name="name" placeholder="Admin Name" required>
          </div>
          <div class="col-md-4">
            <input type="text" class="form-control" name="phone" placeholder="Phone Number" required>
          </div>
          <div class="col-md-4">
            <input type="password" class="form-control" name="password" placeholder="Password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-success mt-3">Add Admin</button>
      </form>
    </div>
  </div>

  <!-- Admins Table -->
  <div class="card">
    <div class="card-header">
      Existing Admins
    </div>
    <div class="card-body">
      <table class="table table-striped table-hover">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for admin in admins %}
          <tr>
            <td>{{ loop.index }}</td>
            <td>{{ admin.name }}</td>
            <td>{{ admin.phone }}</td>
            <td>
              <form method="POST" action="{{ url_for('superadmin.delete_admin', admin_id=admin.id) }}" onsubmit="return confirm('Are you sure you want to delete this admin?');">
                <button type="submit" class="btn btn-danger btn-sm">Delete</button>
              </form>
            </td>
          </tr>
          {% else %}
          <tr>
            <td colspan="4" class="text-center">No admins found.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
