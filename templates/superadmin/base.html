<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Super Admin Panel</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .sidebar {
            min-height: 100vh;
        }
        main {
            padding: 20px;
        }
        .nav-link.active {
            font-weight: bold;
            color: #0d6efd;
        }
    </style>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <nav class="sidebar bg-light p-3">
            <h4>Super Admin</h4>
            <ul class="nav flex-column mt-4">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('public.home') }}">Home (Public)</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('superadmin.dashboard') }}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('superadmin.manage_admins') }}">Manage Admins</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('superadmin.view_audit_logs') }}">Audit Logs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('superadmin.super_admin_reports') }}">Reports</a>
                </li>
                <li class="nav-item mt-3">
                    <a class="nav-link text-danger" href="{{ url_for('superadmin.logout') }}">Logout</a>
                </li>
            </ul>
        </nav>

        <!-- Main content -->
        <main class="flex-grow-1">
            {% block super_admin_content %}
            <!-- Child pages content will go here -->
            {% endblock %}
        </main>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
